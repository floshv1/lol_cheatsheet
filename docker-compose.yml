services:
  backend:
    build: ./backend
    environment:
      - DB_PATH=/data/db.sqlite
      - UPLOADS_PATH=/data/uploads
      - PORT=3001
    volumes:
      - lol_data:/data
    networks:
      - lol-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/api/champions"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=
    ports:
      - "8081:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - lol-net
    restart: unless-stopped

networks:
  lol-net:

volumes:
  lol_data:
