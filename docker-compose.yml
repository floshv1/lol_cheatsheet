services:
  backend:
    build: ./backend
    environment:
      - DB_PATH=/data/db.sqlite
      - UPLOADS_PATH=/data/uploads
      - PORT=3001
    volumes:
      - lol_data:/data
    networks:
      - lol-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=
    ports:
      - "8081:80"
    depends_on:
      - backend
    networks:
      - lol-net
    restart: unless-stopped

networks:
  lol-net:

volumes:
  lol_data:
